name: Auto repatch on upstream release

on:
  schedule:
    - cron: '17 */3 * * *'  # every 3h at :17 (offset to avoid GH cron rush)
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Override upstream tag (default = latest). e.g. v26.506.21252'
        required: false
        type: string
      upstream_repo:
        description: 'Override unpatched rebuild repo (default = ngojclee/codex-desktop-rebuild)'
        required: false
        type: string
      force:
        description: 'Force re-release even if our repo already has this version'
        required: false
        type: boolean
        default: false
      release_suffix:
        description: 'Optional suffix for our release tag, e.g. sendinput => <upstream>-patched-sendinput'
        required: false
        type: string
      codex_ref:
        description: 'openai/codex git ref for source-built sidecar lanes'
        required: false
        type: string
        default: 'main'

permissions:
  contents: write   # required to create releases

env:
  UPSTREAM_REBUILD_REPO: ngojclee/codex-desktop-rebuild

jobs:
  repatch:
    name: Download upstream, apply patches, release
    runs-on: windows-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable


      - name: Determine upstream tag
        id: upstream
        shell: pwsh
        run: |
          $upstreamRepo = '${{ inputs.upstream_repo }}'.Trim()
          if (-not $upstreamRepo) { $upstreamRepo = '${{ env.UPSTREAM_REBUILD_REPO }}' }
          $tag = '${{ inputs.upstream_tag }}'
          if (-not $tag) {
            $latest = gh release view --repo $upstreamRepo --json tagName --jq '.tagName'
            if (-not $latest) { throw "Could not fetch latest upstream release" }
            $tag = $latest
          }
          Write-Host "Upstream rebuild repo: $upstreamRepo"
          Write-Host "Upstream tag: $tag"
          "repo=$upstreamRepo" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if already released in this repo
        id: ours
        shell: pwsh
        run: |
          $upstream = '${{ steps.upstream.outputs.tag }}'
          $suffix = '${{ inputs.release_suffix }}'.Trim()
          if ($suffix) {
            $ourTag = "$upstream-patched-$suffix"
          } else {
            $ourTag = "$upstream-patched"
          }
          $force = '${{ inputs.force }}' -eq 'true'
          $exists = $false
          # gh release view exits 1 when the release doesn't exist. We swallow
          # both stdout and stderr and only check $LASTEXITCODE. We MUST then
          # reset $LASTEXITCODE to 0, otherwise the pwsh wrapper at end-of-step
          # would propagate gh's exit-1 and fail the step.
          gh release view $ourTag --repo $env:GITHUB_REPOSITORY --json tagName 1>$null 2>$null
          if ($LASTEXITCODE -eq 0) { $exists = $true }
          $global:LASTEXITCODE = 0
          Write-Host "Our tag '$ourTag' exists: $exists | force=$force"
          "tag=$ourTag" >> $env:GITHUB_OUTPUT
          if ($exists -and -not $force) {
            "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "::notice::Already released $ourTag — skipping. Use workflow_dispatch with force=true to re-run."
          } else {
            "skip=false" >> $env:GITHUB_OUTPUT
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download upstream Windows zip
        if: steps.ours.outputs.skip == 'false'
        shell: pwsh
        run: |
          $tag = '${{ steps.upstream.outputs.tag }}'
          $upstreamRepo = '${{ steps.upstream.outputs.repo }}'
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          gh release download $tag --repo $upstreamRepo --pattern 'Codex-win-x64-*.zip' --dir artifacts
          Get-ChildItem artifacts | Format-Table -AutoSize
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract
        if: steps.ours.outputs.skip == 'false'
        shell: pwsh
        run: |
          $zip = Get-ChildItem artifacts -Filter 'Codex-win-x64-*.zip' | Select-Object -First 1
          if (-not $zip) { throw "Upstream zip not found" }
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Expand-Archive -LiteralPath $zip.FullName -DestinationPath build -Force
          Write-Host "Extracted to:"
          Get-ChildItem build | Format-Table -AutoSize

      - name: Apply patches
        if: steps.ours.outputs.skip == 'false'
        shell: pwsh
        run: |
          $appDir = (Resolve-Path build).Path
          .\apply-all-patches.ps1 -AppDir $appDir -UpstreamTag '${{ steps.upstream.outputs.tag }}'

      - name: Checkout OpenAI Codex sidecar source
        if: steps.ours.outputs.skip == 'false'
        id: codexsrc
        shell: pwsh
        run: |
          $codexRef = '${{ inputs.codex_ref }}'
          if (-not $codexRef) { $codexRef = 'main' }
          Write-Host "Checking out openai/codex ref: $codexRef"
          git clone --depth 1 --branch $codexRef https://github.com/openai/codex.git codex-src
          if ($LASTEXITCODE -ne 0) {
            git clone --depth 1 https://github.com/openai/codex.git codex-src
            if ($LASTEXITCODE -ne 0) { throw "git clone openai/codex failed with exit $LASTEXITCODE" }
            git -C codex-src fetch --depth 1 origin $codexRef
            if ($LASTEXITCODE -ne 0) { throw "git fetch $codexRef failed with exit $LASTEXITCODE" }
            git -C codex-src checkout FETCH_HEAD
            if ($LASTEXITCODE -ne 0) { throw "git checkout $codexRef failed with exit $LASTEXITCODE" }
          }
          $sourceSha = (git -C codex-src rev-parse HEAD).Trim()
          $sourceDate = (git -C codex-src show -s --format=%cI HEAD).Trim()
          Write-Host "OpenAI Codex source SHA: $sourceSha"
          Write-Host "OpenAI Codex source date: $sourceDate"
          "resolved_ref=$codexRef" >> $env:GITHUB_OUTPUT
          "source_sha=$sourceSha" >> $env:GITHUB_OUTPUT
          "source_date=$sourceDate" >> $env:GITHUB_OUTPUT

      - name: Cache Rust build outputs
        if: steps.ours.outputs.skip == 'false'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-src/codex-rs -> target
          cache-on-failure: true

      - name: Update bundled Codex CLI sidecar
        if: steps.ours.outputs.skip == 'false'
        id: sidecar
        shell: pwsh
        timeout-minutes: 45
        run: |
          $appDir = (Resolve-Path build).Path
          $target = Join-Path $appDir 'resources\codex.exe'
          if (-not (Test-Path -LiteralPath $target)) { throw "Missing bundled sidecar: $target" }

          $codexRef = '${{ inputs.codex_ref }}'
          if (-not $codexRef) { $codexRef = 'main' }
          Write-Host "Building source-patched sidecar from openai/codex ref: $codexRef"

          $codexSrc = 'codex-src'
          if (-not (Test-Path -LiteralPath $codexSrc)) { throw "Missing sidecar source checkout: $codexSrc" }

          $common = Join-Path $codexSrc 'codex-rs\core\src\tools\handlers\multi_agents_common.rs'

          if (-not (Test-Path -LiteralPath $common)) { throw "Missing upstream source file: $common" }
          $sourceText = Get-Content -Raw -LiteralPath $common
          if ($sourceText -notmatch 'fn parse_collab_input\(') { throw 'parse_collab_input not found' }
          if ($sourceText -notmatch 'items\.filter\(\|items\| !items\.is_empty\(\)\)') {
            $sourceText = $sourceText -replace 'match \(message, items\) \{', "let items = items.filter(|items| !items.is_empty());`n    match (message, items) {"
            Set-Content -LiteralPath $common -Value $sourceText -NoNewline
          }
          if ((Get-Content -Raw -LiteralPath $common) -notmatch 'items\.filter\(\|items\| !items\.is_empty\(\)\)') {
            throw 'Patch I verification failed: empty-items normalization marker missing'
          }

          Push-Location (Join-Path $codexSrc 'codex-rs')
          Write-Host 'Rust/Cargo versions:'
          rustc --version
          cargo --version
          Write-Host 'Starting cargo build: codex-cli dev-small'
          cargo build --profile dev-small -p codex-cli --bin codex --verbose
          if ($LASTEXITCODE -ne 0) { throw "cargo build codex-cli dev-small failed with exit $LASTEXITCODE" }
          Pop-Location

          $built = Join-Path $codexSrc 'codex-rs\target\dev-small\codex.exe'
          if (-not (Test-Path -LiteralPath $built)) { throw "Built codex.exe not found: $built" }
          $newVersion = (& $built --version).Trim()
          $oldVersion = (& $target --version).Trim()
          Copy-Item -Force -LiteralPath $built -Destination $target
          $verifiedVersion = (& $target --version).Trim()
          if ($verifiedVersion -ne $newVersion) {
            throw "Sidecar copy verification failed: copied $newVersion but target reports $verifiedVersion"
          }

          Write-Host "Bundled sidecar before update: $oldVersion"
          Write-Host "Bundled sidecar after update: $verifiedVersion"
          "old_version=$oldVersion" >> $env:GITHUB_OUTPUT
          "new_version=$verifiedVersion" >> $env:GITHUB_OUTPUT
          "patch_i=true" >> $env:GITHUB_OUTPUT

      - name: Verify patch markers
        if: steps.ours.outputs.skip == 'false'
        shell: pwsh
        run: |
          $appDir = (Resolve-Path build).Path
          python patches/verify_markers.py "$appDir" --upstream-tag '${{ steps.upstream.outputs.tag }}'

      - name: Remove patcher backup artifacts from package
        if: steps.ours.outputs.skip == 'false'
        shell: pwsh
        run: |
          $appDir = (Resolve-Path build).Path
          $backupFiles = @()
          $backupFiles += Get-Item -LiteralPath (Join-Path $appDir 'Codex.exe.bak-before-fuse-patch') -ErrorAction SilentlyContinue
          $backupFiles += Get-ChildItem -LiteralPath (Join-Path $appDir 'resources') -File -Force -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like 'app.asar.bak-before-*' }

          if ($backupFiles.Count -eq 0) {
            Write-Host 'No patcher backup artifacts found in package.'
            return
          }

          $total = ($backupFiles | Measure-Object -Property Length -Sum).Sum
          $backupFiles | ForEach-Object {
            Write-Host ("Removing package-only backup: {0} ({1:N1} MB)" -f $_.FullName, ($_.Length / 1MB))
            Remove-Item -LiteralPath $_.FullName -Force
          }
          Write-Host ("Removed {0} package backup artifact(s), saving about {1:N1} MB." -f $backupFiles.Count, ($total / 1MB))

      - name: Bundle runtime/ into build/tools/
        if: steps.ours.outputs.skip == 'false'
        shell: pwsh
        run: |
          # Copy runtime/ scripts into the install's tools/ folder so fresh
          # installs (and Update-Codex.ps1) get Launch-Codex launchers,
          # log-window launchers, Update-Codex.{ps1,cmd}, refresh helpers,
          # watchdog, etc.
          $tools = 'build/tools'
          New-Item -ItemType Directory -Force -Path $tools | Out-Null
          Copy-Item -Recurse -Force runtime/* $tools
          $sidecarSource = @"
          upstream_rebuild_repo=${{ steps.upstream.outputs.repo }}
          upstream_tag=${{ steps.upstream.outputs.tag }}
          codex_ref=${{ steps.codexsrc.outputs.resolved_ref }}
          codex_source_sha=${{ steps.codexsrc.outputs.source_sha }}
          codex_source_date=${{ steps.codexsrc.outputs.source_date }}
          sidecar_old_version=${{ steps.sidecar.outputs.old_version }}
          sidecar_new_version=${{ steps.sidecar.outputs.new_version }}
          "@
          $sidecarSource.Trim() | Set-Content -LiteralPath (Join-Path $tools '.sidecar-source') -Encoding UTF8
          Get-ChildItem $tools | Format-Table -AutoSize

      - name: Repackage zip
        if: steps.ours.outputs.skip == 'false'
        id: pack
        shell: pwsh
        run: |
          $tag = '${{ steps.ours.outputs.tag }}'
          $out = "CodexDesktop-Patched-win-x64-$tag.zip"
          Compress-Archive -Path build\* -DestinationPath $out -Force
          $sz = (Get-Item $out).Length / 1MB
          Write-Host ("Packed: $out  ({0:N0} MB)" -f $sz)
          "asset=$out" >> $env:GITHUB_OUTPUT

      - name: Delete existing release if force-rebuild
        if: steps.ours.outputs.skip == 'false' && inputs.force == true
        shell: pwsh
        run: |
          $tag = '${{ steps.ours.outputs.tag }}'
          Write-Host "Force rebuild — deleting existing release $tag (if any) so we can recreate."
          gh release delete $tag --repo $env:GITHUB_REPOSITORY --yes --cleanup-tag 2>&1 | Out-Host
          # release delete returns non-zero if it didn't exist — ignore.
          $global:LASTEXITCODE = 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release in this repo
        if: steps.ours.outputs.skip == 'false'
        shell: pwsh
        run: |
          $tag = '${{ steps.ours.outputs.tag }}'
          $upstream = '${{ steps.upstream.outputs.tag }}'
          $upstreamRepo = '${{ steps.upstream.outputs.repo }}'
          $asset = '${{ steps.pack.outputs.asset }}'
          $notes = @"
          Patched build derived from upstream rebuild [$upstreamRepo $upstream](https://github.com/$upstreamRepo/releases/tag/$upstream).

          ## Patches applied
          - **Patch A** — bump `listRecentThreads` renderer `limit:50` to `limit:1000`
          - **Patch B** — flip Electron fuse `EnableEmbeddedAsarIntegrityValidation` so the modified asar is accepted
          - **Patch C v3** — always-paginate `refetchThreadList` to load up to 2000 threads on every refresh (no v2 guard)
          - **Patch D** — clear renderer `conversations` Map on sidecar reconnect so the soft-refresh workflow actually refreshes UI content
            - skipped automatically on upstream `26.513.x` because that lane regressed thread-open hydration in the renderer
          - **Patch G** — bypass hardcoded SOCKS5 proxy in WS transport so a local sidecar can be shared between Desktop and CLI for real-time UI updates
          - **Patch H** — sanitize Windows backslashes in app directive lines before markdown directive parsing so one malformed directive cannot crash thread rendering
          - **Patch I** — source-built `resources/codex.exe` with `send_input` empty-items normalization baked into the default release lane
          - **Patch J** — bypass renderer Statsig gates for Computer Use (Any App + Chrome)
          - **Patch K** — expose the bundled Codex mobile setup route in the sidebar while preserving upstream account/auth checks
          - **Patch L** — decode percent-escaped plugin package folders so Computer Use can resolve `@oai/sky` and its vendored pnpm deps

          ## Bundled Codex CLI sidecar
          - Replaced upstream `resources/codex.exe` (`${{ steps.sidecar.outputs.old_version }}`) with `${{ steps.sidecar.outputs.new_version }}`. The default lane now uses a source-built `openai/codex` binary with Patch I merged in.
          - Source ref ${{ steps.codexsrc.outputs.resolved_ref }} resolved to [${{ steps.codexsrc.outputs.source_sha }}](https://github.com/openai/codex/commit/${{ steps.codexsrc.outputs.source_sha }}) from ${{ steps.codexsrc.outputs.source_date }}. The same metadata is bundled at tools\.sidecar-source.

          ## Install
          1. Download `$asset`
          2. Extract to `%LOCALAPPDATA%\CodexFromGithub\`
          3. Launch via `tools\Launch-Codex.vbs` (or pin it to your desktop)
             — the launcher starts a shared app-server sidecar, sets
             `CODEX_APP_SERVER_WS_URL`, runs Codex.exe, then cleans up.
             Use `tools\Launch-Codex-Logs.vbs` when you want a visible
             sidecar log window while debugging.
             Use `tools\Launch-Codex-Dev.vbs` only when you want the same
             shared-sidecar launch path with `BUILD_FLAVOR=dev` for feature
             probing; the default lane stays on Owl.

          ## Shared sidecar usage
          CLI can join the same sidecar with `codex resume <id> --remote ws://127.0.0.1:<PORT>`
          (port logged in `~/.codex/desktop-shared-app-server.json`). Dispatches
          show up in Desktop UI in real time.

          See [HANDOFF.md](https://github.com/ngojclee/codex-desktop/blob/main/docs/HANDOFF.md) and [README.md](https://github.com/ngojclee/codex-desktop/blob/main/README.md) for runtime workflow.
          "@
          gh release create $tag $asset `
            --repo $env:GITHUB_REPOSITORY `
            --title "Codex Patched $tag" `
            --notes $notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
